# ============================================================
# Nginx site configuration for gomygroup.online
# Deploy: copy to /etc/nginx/sites-available/gomygroup.online
#         then: ln -sf /etc/nginx/sites-available/gomygroup.online \
#                      /etc/nginx/sites-enabled/gomygroup.online
#         then: nginx -t && systemctl reload nginx
# ============================================================

# Redirect bare HTTP → HTTPS
server {
    listen 80;
    server_name gomygroup.online www.gomygroup.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gomygroup.online www.gomygroup.online;

    # ----------------------------------------------------------
    # SSL (update paths to your actual certificate files)
    # ----------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/gomygroup.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gomygroup.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ----------------------------------------------------------
    # Upload limits — MUST be set here (server block level) so
    # that Nginx accepts the full 200 MB body before proxying to
    # the Node backend.  Without this directive Nginx itself
    # returns 413 before the request reaches Express/Multer.
    # ----------------------------------------------------------
    client_max_body_size 210m;   # 10 MB headroom above the 200 MB app limit

    # ----------------------------------------------------------
    # Proxy timeouts for large uploads (200 MB on a slow link
    # can take several minutes)
    # ----------------------------------------------------------
    proxy_read_timeout    600s;
    proxy_send_timeout    600s;
    proxy_connect_timeout  60s;

    # Do NOT buffer the request body to disk — stream it directly
    # to the upstream so Express/Multer can start processing while
    # the client is still sending.
    proxy_request_buffering off;

    # ----------------------------------------------------------
    # API proxy → Node/Express backend
    # ----------------------------------------------------------
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # Health / readiness probes
    location ~ ^/(health|ready)$ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }

    # ----------------------------------------------------------
    # Static React frontend (adjust path to your build output)
    # ----------------------------------------------------------
    location / {
        root  /var/www/gomygroup/public/static;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Aggressive caching for hashed assets; no-cache for HTML
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
