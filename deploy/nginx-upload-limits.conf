# Upload-limit directives for gomygroup.online
#
# IMPORTANT: these lines alone are NOT enough — they must live inside
# an active server { } block that Nginx is actually serving.
#
# The recommended approach is to use the complete site config:
#   deploy/nginx-gomygroup.conf
#
# If you prefer the include approach, add the following line inside
# the server { } block in your existing vhost file:
#
#   include /path/to/deploy/nginx-upload-limits.conf;
#
# ---------------------------------------------------------------
# Required for media-document uploads up to 200 MB.
# Set 10 MB above the app limit so Nginx never fires 413 before
# Express/Multer gets a chance to validate and give a friendly error.
# ---------------------------------------------------------------
client_max_body_size 210m;

# Generous timeouts: a 200 MB file on a 5 Mbps uplink takes ~5 min.
proxy_read_timeout    600s;
proxy_send_timeout    600s;
proxy_connect_timeout  60s;

# Stream the body directly to upstream instead of buffering to disk.
proxy_request_buffering off;
