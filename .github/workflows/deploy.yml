# =============================================================================
# Multi-Tenant Platform - CI/CD Pipeline
# Builds Docker image and deploys to AWS EC2
# =============================================================================

name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'

jobs:
  # ===========================================================================
  # Test Job - Run tests before building
  # ===========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Backend Tests
        run: |
          cd backend
          npm test -- --passWithNoTests
        continue-on-error: true

  # ===========================================================================
  # Build Job - Build and push Docker image to Docker Hub
  # ===========================================================================
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_name: ${{ steps.vars.outputs.image_name }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Image Name
        id: vars
        run: echo "image_name=${{ secrets.DOCKERHUB_USERNAME }}/multi-tenant-platform" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image_name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            VITE_API_BASE_URL=/api/v1
            VITE_BACKEND_URL=

  # ===========================================================================
  # Deploy Job - Deploy to AWS EC2
  # ===========================================================================
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Set variables
            IMAGE_NAME="mygroup2025/multi-tenant-platform:latest"
            CONTAINER_NAME="multi-tenant-app"

            # Ensure host uploads directory exists and has correct ownership
            echo "📦 Setting up uploads directory..."
            sudo mkdir -p /var/app/uploads
            sudo chown -R 1001:1001 /var/app/uploads
            sudo chmod -R 755 /var/app/uploads

            # AGGRESSIVE CLEANUP: Kill any process on port 5000
            echo "� Killing any process on port 5000..."
            sudo lsof -ti :5000 | xargs sudo kill -9 2>/dev/null || true
            sleep 1

            # Stop container by name
            echo "🛑 Stopping container by name..."
            sudo docker stop $CONTAINER_NAME 2>/dev/null || true
            sleep 1

            # Kill container by name (force)
            echo "🔴 Force killing container..."
            sudo docker kill $CONTAINER_NAME 2>/dev/null || true
            sleep 1

            # Remove container
            echo "🗑️  Removing container..."
            sudo docker rm -f $CONTAINER_NAME 2>/dev/null || true
            sleep 1

            # Remove old image
            echo "🧹 Removing old image..."
            sudo docker rmi $IMAGE_NAME 2>/dev/null || true

            # Prune all unused images and volumes
            echo "🧹 Pruning unused Docker resources..."
            sudo docker system prune -f --all 2>/dev/null || true

            # Wait for port to be fully released
            echo "⏳ Waiting for port 5000 to be released..."
            sleep 3

            # Pull the fresh latest image
            echo "📦 Pulling fresh Docker image..."
            sudo docker pull $IMAGE_NAME

            # Run the new container
            echo "🚀 Starting new container..."
            sudo docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p 5000:5000 \
              -e NODE_ENV=production \
              -e PORT=5000 \
              -e USE_HTTPS=false \
              -e DB_HOST="${{ secrets.DB_HOST }}" \
              -e DB_PORT="${{ secrets.DB_PORT }}" \
              -e DB_NAME="${{ secrets.DB_NAME }}" \
              -e DB_USER="${{ secrets.DB_USER }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e CORS_ORIGIN="${{ secrets.CORS_ORIGIN }}" \
              -e FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
              -v /var/app/uploads:/app/public/uploads \
              $IMAGE_NAME

            # Clean up old images
            echo "🧹 Cleaning up old images..."
            sudo docker image prune -f

            # Verify deployment
            echo "✅ Verifying deployment..."
            sleep 10

            # Check if container is running
            echo ""
            echo "📋 Checking container status..."
            if sudo docker ps | grep -q $CONTAINER_NAME; then
              echo "✅ Container is running"
              sudo docker ps | grep $CONTAINER_NAME
            else
              echo "❌ Container is not running"
              echo "📄 Recent container logs:"
              sudo docker logs $CONTAINER_NAME 2>&1 | tail -30
              exit 1
            fi

            # Check port binding
            echo ""
            echo "📋 Checking port 5000..."
            sudo netstat -tlnp 2>/dev/null | grep 5000 || echo "⚠️  Port 5000 may not be properly bound"

            # Health check
            echo ""
            echo "📋 Testing health endpoint..."
            if curl -f -v http://localhost:5000/health; then
              echo ""
              echo "✅ Health check passed!"
            else
              echo ""
              echo "❌ Health check failed!"
              echo "📄 Container logs:"
              sudo docker logs $CONTAINER_NAME | tail -30
              exit 1
            fi

            # Test asset loading
            echo ""
            echo "📋 Testing static asset serving..."
            curl -I http://localhost:5000/ 2>&1 | head -10

            echo ""
            echo "🎉 Deployment verification complete!"
            echo "📝 Access your app at: http://YOUR_EC2_IP:5000"
            echo "⚠️  Make sure your AWS security group allows inbound traffic on port 5000"

