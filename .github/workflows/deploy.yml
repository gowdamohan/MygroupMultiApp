# =============================================================================
# Multi-Tenant Platform - CI/CD Pipeline
# Builds Docker image and deploys to AWS EC2
# =============================================================================

name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'

jobs:
  # ===========================================================================
  # Test Job - Run tests before building
  # ===========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Backend Tests
        run: |
          cd backend
          npm test -- --passWithNoTests
        continue-on-error: true

  # ===========================================================================
  # Build + Deploy — ONE runner (build then SSH deploy on same machine)
  # Avoids waiting 10+ min for a 2nd GitHub-hosted runner when Actions is busy
  # ===========================================================================
  build:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Image Name
        id: vars
        run: echo "image_name=${{ secrets.DOCKERHUB_USERNAME }}/multi-tenant-platform" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image_name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL || '' }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL || '/api/v1' }}
            VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL || '' }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/multi-tenant-platform:latest
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          envs: IMAGE_NAME
          script: |
            CONTAINER_NAME="multi-tenant-app"

            echo "Setting up uploads directory..."
            sudo mkdir -p /var/app/uploads
            sudo chown -R 1001:1001 /var/app/uploads
            sudo chmod -R 755 /var/app/uploads

            echo "Killing any process on port 5000..."
            sudo lsof -ti :5000 | xargs sudo kill -9 2>/dev/null || true
            sleep 1

            echo "Stopping container..."
            sudo docker stop $CONTAINER_NAME 2>/dev/null || true
            sleep 1

            echo "Force killing container..."
            sudo docker kill $CONTAINER_NAME 2>/dev/null || true
            sleep 1

            echo "Removing container..."
            sudo docker rm -f $CONTAINER_NAME 2>/dev/null || true
            sleep 1

            echo "Removing old image..."
            sudo docker rmi $IMAGE_NAME 2>/dev/null || true

            echo "Pruning unused Docker resources..."
            sudo docker system prune -f --all 2>/dev/null || true

            echo "Waiting for port 5000..."
            sleep 3

            echo "Pulling image: $IMAGE_NAME"
            sudo docker pull $IMAGE_NAME

            echo "Starting container..."
            sudo docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p 5000:5000 \
              -e NODE_ENV=production \
              -e PORT=5000 \
              -e USE_HTTPS=false \
              -e DB_HOST="${{ secrets.DB_HOST }}" \
              -e DB_PORT="${{ secrets.DB_PORT }}" \
              -e DB_NAME="${{ secrets.DB_NAME }}" \
              -e DB_USER="${{ secrets.DB_USER }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e CORS_ORIGIN="${{ secrets.CORS_ORIGIN }}" \
              -e FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
              -v /var/app/uploads:/app/public/uploads \
              $IMAGE_NAME

            sudo docker image prune -f
            sleep 10

            if sudo docker ps | grep -q $CONTAINER_NAME; then
              echo "Container is running"
              sudo docker ps | grep $CONTAINER_NAME
            else
              echo "Container failed to start"
              sudo docker logs $CONTAINER_NAME 2>&1 | tail -30
              exit 1
            fi

            if curl -f http://localhost:5000/health; then
              echo "Health check passed"
            else
              echo "Health check failed"
              sudo docker logs $CONTAINER_NAME | tail -30
              exit 1
            fi

            echo "Deployment complete"
